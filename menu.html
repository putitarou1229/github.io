<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>メニュー</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="nav">
    <a href="index.html">ホーム</a>
    <a href="menu.html">メニュー</a>
    <a href="access.html">アクセス</a>
    <a href="info.html">店主紹介</a>
  </nav>

  <section class="menu">
    <h2>Menu</h2>

    <h3 class="category-title">Coffee</h3>

    <div class="menu-grid">

      <!-- コーヒー -->
      <div class="card">
        <img src="img/coffee.png" alt="コーヒー" class="menu-img">
        <h3>ブレンドコーヒー</h3>
        <p class="price">¥400</p>
      </div>

      <div class="card">
        <img src="img/late.png" alt="ラテ" class="menu-img">
        <h3>カフェラテ</h3>
        <p class="price">¥450</p>
      </div>

      <div class="card">
        <img src="img/capchino.png" alt="カプチーノ" class="menu-img">
        <h3>カプチーノ</h3>
        <p class="price">¥500</p>
      </div>

      <div class="card">
        <img src="img/ice coffee.png" alt="アイスコーヒー" class="menu-img">
        <h3>アイスコーヒー</h3>
        <p class="price">¥400</p>
      </div>

      <div class="card">
        <img src="img/caramel.png" alt="キャラメルラテ" class="menu-img">
        <h3>キャラメルラテ</h3>
        <p class="price">¥600</p>
      </div>
    </div>

    <h3 class="category-title">Cake</h3>

    <div class="menu-grid">

      <!-- ケーキ -->
      <div class="card">
        <img src="img/cheezecake.png" alt="チーズケーキ" class="menu-img">
        <h3>チーズケーキ</h3>
        <p class="price">¥650</p>
      </div>

      <div class="card">
        <img src="img/shortcake.png" alt="ショートケーキ" class="menu-img">
        <h3>ショートケーキ</h3>
        <p class="price">¥600</p>
      </div>

      <div class="card">
        <img src="img/gatoshocora.png" alt="ガトーショコラ" class="menu-img">
        <h3>ガトーショコラ</h3>
        <p class="price">¥650</p>

      </div>
      <div class="card">
        <img src="img/monbran.png" alt="モンブラン" class="menu-img">
        <h3>モンブラン</h3>
        <p class="price">¥600</p>

      </div>
      <div class="card">
        <img src="img/shifon.png" alt="シフォンケーキ" class="menu-img">
        <h3>シフォンケーキ</h3>
        <p class="price">¥550</p>
      </div>

    </div>
  </section>

  <div id="modal">
    <img id="modal-img">
  </div>

  <script src="script.js"></script>

</body>

</html>
